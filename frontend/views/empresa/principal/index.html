<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Empresa | Workly</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Workly Empresa</a>
      <button class="btn btn-light btn-sm" id="btnLogout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="py-4">
    <div class="container">
      <div class="mb-4">
        <h1 class="page-title mb-1">Bienvenido, <span id="nombreEmpresa">Empresa</span></h1>
        <p class="text-muted mb-0">Gestiona tus vacantes y revisa postulaciones</p>
      </div>

      <div id="alertContainer"></div>

      <div class="row g-3 mb-4">
        <div class="col-md-6 col-lg-3">
          <div class="card card-custom p-3 dashboard-card">
            <h6 class="text-muted">Vacantes publicadas</h6>
            <h2 id="totalVacantes">0</h2>
          </div>
        </div>

        <div class="col-md-6 col-lg-3">
          <div class="card card-custom p-3 dashboard-card">
            <h6 class="text-muted">Postulaciones recibidas</h6>
            <h2 id="totalPostulaciones">0</h2>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card card-custom p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="mb-0">Últimas vacantes</h5>
              <a href="../misvacantes/index.html" class="btn btn-sm btn-outline-primary">Ver todas</a>
            </div>
            <div id="ultimasVacantes" class="small-empty">
              <div class="text-muted">Cargando vacantes...</div>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card card-custom p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="mb-0">Últimas postulaciones</h5>
              <a href="../postulaciones/index.html" class="btn btn-sm btn-outline-primary">Ver todas</a>
            </div>
            <div id="ultimasPostulaciones" class="small-empty">
              <div class="text-muted">Cargando postulaciones...</div>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3 mt-4">
        <div class="col-md-4">
          <a href="../publicarvacante/index.html" class="btn btn-primary w-100 py-3">Publicar vacante</a>
        </div>
        <div class="col-md-4">
          <a href="../misvacantes/index.html" class="btn btn-outline-primary w-100 py-3">Mis vacantes</a>
        </div>
        <div class="col-md-4">
          <a href="../perfil/index.html" class="btn btn-outline-secondary w-100 py-3">Mi perfil</a>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
