<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reseñas de Empresa | Workly</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../principal/index.html">Workly Empresa</a>
      <button class="btn btn-light btn-sm" id="btnLogout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="py-4">
    <div class="container">
      <div class="mb-3">
        <a href="../principal/index.html" class="btn btn-outline-secondary btn-sm">← Volver al panel</a>
      </div>

      <div class="mb-4">
        <h1 class="page-title mb-1">Reseñas de mi empresa</h1>
        <p class="text-muted mb-0">Consulta la valoración que han dejado los usuarios</p>
      </div>

      <div id="alertContainer"></div>

      <div class="card card-custom p-4 mb-4">
        <h5 class="mb-3">Resumen general</h5>
        <div id="resumenEmpresa">
          <p class="text-muted mb-0">Cargando resumen...</p>
        </div>
      </div>

      <div class="card card-custom p-4">
        <h5 class="mb-3">Listado de reseñas</h5>
        <div id="listaValoraciones">
          <p class="text-muted mb-0">Cargando valoraciones...</p>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
