<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicar Vacante | Workly</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../principal/index.html">Workly Empresa</a>
      <button class="btn btn-light btn-sm" id="btnLogout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="py-4">
    <div class="container">
      <div class="mb-3">
        <a href="../principal/index.html" class="btn btn-outline-secondary btn-sm">← Volver al panel</a>
      </div>

      <div class="mb-4">
        <h1 class="page-title mb-1">Publicar vacante</h1>
        <p class="text-muted mb-0">Completa la información para publicar una nueva oportunidad</p>
      </div>

      <div id="alertContainer"></div>

      <div class="card card-custom p-4">
        <form id="formVacante">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="id_categoria_fk" class="form-label">Categoría</label>
              <select id="id_categoria_fk" class="form-select" required>
                <option value="">Selecciona una categoría</option>
              </select>
            </div>

            <div class="col-md-6">
              <label for="id_municipio_fk" class="form-label">Municipio</label>
              <select id="id_municipio_fk" class="form-select" required>
                <option value="">Selecciona un municipio</option>
              </select>
            </div>

            <div class="col-md-8">
              <label for="titulo_puesto" class="form-label">Título del puesto</label>
              <input type="text" id="titulo_puesto" class="form-control" placeholder="Ejemplo: Backend Developer" required>
            </div>

            <div class="col-md-4">
              <label for="modalidad" class="form-label">Modalidad</label>
              <select id="modalidad" class="form-select" required>
                <option value="">Selecciona una modalidad</option>
                <option value="Remoto">Remoto</option>
                <option value="Presencial">Presencial</option>
                <option value="Híbrido">Híbrido</option>
              </select>
            </div>

            <div class="col-md-4">
              <label for="salario_offrecido" class="form-label">Salario ofrecido</label>
              <input type="number" step="0.01" id="salario_offrecido" class="form-control" placeholder="0.00" required>
            </div>

            <div class="col-12">
              <label for="descripcion_puesto" class="form-label">Descripción del puesto</label>
              <textarea id="descripcion_puesto" class="form-control" rows="6" placeholder="Describe responsabilidades, requisitos y beneficios" required></textarea>
            </div>

            <div class="col-12 d-flex gap-2 pt-2">
              <button type="submit" class="btn btn-primary">Publicar vacante</button>
              <button type="button" class="btn btn-outline-secondary" id="btnLimpiar">Limpiar</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
