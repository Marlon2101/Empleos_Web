<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de Empresa | Workly</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../principal/index.html">Workly Empresa</a>
      <button class="btn btn-light btn-sm" id="btnLogout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="py-4">
    <div class="container">
      <div class="mb-3">
        <a href="../principal/index.html" class="btn btn-outline-secondary btn-sm">← Volver al panel</a>
      </div>

      <div class="mb-4">
        <h1 class="page-title mb-1">Perfil de empresa</h1>
        <p class="text-muted mb-0">Actualiza la información pública de tu empresa</p>
      </div>

      <div id="alertContainer"></div>

      <div class="card card-custom p-4">
        <form id="formPerfilEmpresa">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="nombre_comercial" class="form-label">Nombre comercial</label>
              <input type="text" id="nombre_comercial" class="form-control" required>
            </div>

            <div class="col-md-6">
              <label for="razon_social" class="form-label">Razón social</label>
              <input type="text" id="razon_social" class="form-control" required>
            </div>

            <div class="col-md-6">
              <label for="correo_electronico" class="form-label">Correo electrónico</label>
              <input type="email" id="correo_electronico" class="form-control" disabled>
            </div>

            <div class="col-md-6">
              <label for="sitio_web" class="form-label">Sitio web</label>
              <input type="text" id="sitio_web" class="form-control" placeholder="www.ejemplo.com">
            </div>

            <div class="col-md-6">
              <label for="id_municipio_fk" class="form-label">Municipio</label>
              <select id="id_municipio_fk" class="form-select" required>
                <option value="">Selecciona un municipio</option>
              </select>
            </div>

            <div class="col-12">
              <label for="descripcion_empresa" class="form-label">Descripción de la empresa</label>
              <textarea id="descripcion_empresa" class="form-control" rows="6" required></textarea>
            </div>

            <div class="col-12">
              <button type="submit" class="btn btn-primary">Guardar cambios</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
