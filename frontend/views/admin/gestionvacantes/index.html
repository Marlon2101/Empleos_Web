<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Vacantes | Workly Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../principal/index.html">Workly Admin</a>
      <button class="btn btn-light btn-sm" id="btnLogout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="py-4">
    <div class="container">
      <div class="mb-3">
        <a href="../principal/index.html" class="btn btn-outline-secondary btn-sm">← Volver al panel</a>
      </div>

      <div class="mb-4">
        <h1 class="page-title mb-1">Gestión de vacantes</h1>
        <p class="text-muted mb-0">Administra las vacantes publicadas en la plataforma</p>
      </div>

      <div id="alertContainer"></div>

      <div class="card card-custom p-3 p-md-4">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Puesto</th>
                <th>Empresa</th>
                <th>Categoría</th>
                <th>Modalidad</th>
                <th>Salario</th>
                <th>Fecha</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tablaVacantes">
              <tr>
                <td colspan="7" class="text-muted">Cargando vacantes...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
