<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Usuario | Workly</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Workly Usuario</a>
      <button class="btn btn-light btn-sm" id="btnLogout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="py-4">
    <div class="container">
      <div class="mb-4">
        <h1 class="page-title mb-1">Bienvenido, <span id="nombreUsuario">Usuario</span></h1>
        <p class="text-muted mb-0">Este es tu panel principal</p>
      </div>

      <div id="alertContainer"></div>

      <div class="row g-3 mb-4">
        <div class="col-md-6 col-lg-3">
          <div class="card card-custom p-3 dashboard-card">
            <h6 class="text-muted">Total postulaciones</h6>
            <h2 id="totalPostulaciones">0</h2>
          </div>
        </div>

        <div class="col-md-6 col-lg-3">
          <div class="card card-custom p-3 dashboard-card">
            <h6 class="text-muted">Total habilidades</h6>
            <h2 id="totalHabilidades">0</h2>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card card-custom p-3">
            <h5 class="mb-3">Últimas postulaciones</h5>
            <div id="ultimasPostulaciones" class="list-group small-empty">
              <div class="text-muted">Cargando...</div>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card card-custom p-3">
            <h5 class="mb-3">Vacantes recientes</h5>
            <div id="vacantesRecientes" class="list-group small-empty">
              <div class="text-muted">Cargando...</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
