<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil | Workly</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../principal/index.html">Workly Usuario</a>
      <button class="btn btn-light btn-sm" id="btnLogout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="py-4">
    <div class="container">
      <div class="mb-3">
        <a href="../principal/index.html" class="btn btn-outline-secondary btn-sm">← Volver al panel</a>
      </div>

      <div class="mb-4">
        <h1 class="page-title mb-1">Mi perfil</h1>
        <p class="text-muted mb-0">Actualiza tu información y tus habilidades</p>
      </div>

      <div id="alertContainer"></div>

      <div class="row g-4">
        <div class="col-lg-8">
          <div class="card card-custom p-4">
            <h4 class="mb-3">Información personal</h4>

            <form id="formPerfil">
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="nombres" class="form-label">Nombres</label>
                  <input type="text" id="nombres" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="apellidos" class="form-label">Apellidos</label>
                  <input type="text" id="apellidos" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="telefono" class="form-label">Teléfono</label>
                  <input type="text" id="telefono" class="form-control" required>
                </div>

                <div class="col-md-6">
                  <label for="id_municipio_fk" class="form-label">Municipio</label>
                  <select id="id_municipio_fk" class="form-select" required>
                    <option value="">Selecciona un municipio</option>
                  </select>
                </div>

                <div class="col-12">
                  <label for="resumen_profesional" class="form-label">Resumen profesional</label>
                  <textarea id="resumen_profesional" class="form-control" rows="5" required></textarea>
                </div>

                <div class="col-12">
                  <button type="submit" class="btn btn-primary">Guardar cambios</button>
                </div>
              </div>
            </form>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card card-custom p-4">
            <h4 class="mb-3">Mis habilidades</h4>

            <div class="mb-3">
              <label for="id_habilidad_fk" class="form-label">Agregar habilidad</label>
              <div class="d-flex gap-2">
                <select id="id_habilidad_fk" class="form-select">
                  <option value="">Selecciona una habilidad</option>
                </select>
                <button class="btn btn-primary" id="btnAgregarHabilidad" type="button">Agregar</button>
              </div>
            </div>

            <div id="listaHabilidades">
              <p class="text-muted mb-0">Cargando habilidades...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
