<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workly · Notificaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-deep: #3f51b5;
            --nav-bg: #011671;
            --body-bg: #f5f7fc;
            --card-shadow: 0 20px 35px -12px rgba(1, 22, 113, 0.08);
        }

        body {
            font-family: "Inter", sans-serif;
            background: linear-gradient(180deg, #eff4ff 0%, #f8faff 100%);
        }

        .navbar-custom,
        .footer-custom {
            background-color: var(--nav-bg);
        }

        .nav-link-custom {
            color: #fff;
            text-decoration: none;
            padding: 0.55rem 1rem;
            border-radius: 999px;
            transition: 0.2s ease;
        }

        .nav-link-custom:hover,
        .nav-link-custom.active {
            background: rgba(255, 255, 255, 0.12);
        }

        .surface-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.75);
            box-shadow: var(--card-shadow);
        }

        .notification-card {
            border-radius: 24px;
            border: 1px solid #e8edf6;
            transition: 0.2s ease;
        }

        .notification-card.unread {
            border-left: 5px solid var(--primary-deep);
            background: linear-gradient(90deg, #ffffff 0%, #f8faff 100%);
        }

        .icon-pill {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #eef2ff;
            color: var(--primary-deep);
        }

        .badge-soft {
            background: #eef2ff;
            color: var(--primary-deep);
            font-weight: 600;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-custom py-3">
        <div class="container-fluid px-4 px-lg-5">
            <a class="navbar-brand text-white fw-bold fs-3 d-flex align-items-center gap-2" href="../principal/index.html">
                <i class="bi bi-briefcase-fill"></i>
                <span>Workly</span>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <div class="navbar-nav mx-auto gap-2 mt-3 mt-lg-0">
                    <a href="../buscarempleo/index.html" class="nav-link-custom">Busqueda</a>
                    <a href="../recursos/index.html" class="nav-link-custom">Recursos</a>
                    <a href="../valoracionempresa/index.html" class="nav-link-custom">Valoraciones</a>
                    <a href="../miperfil/index.html" class="nav-link-custom">Mi perfil</a>
                </div>
                <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
                    <a href="../notificaciones/index.html" class="text-white position-relative text-decoration-none">
                        <i class="bi bi-bell-fill fs-4"></i>
                        <span class="notification-badge position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
                    </a>
                    <a href="../miperfil/index.html" class="text-white text-decoration-none">
                        <i class="bi bi-person-circle fs-3"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 py-4">
        <div class="container px-4 px-lg-5">
            <div class="surface-card p-4 p-lg-5">
                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
                    <div>
                        <h1 class="h3 fw-bold mb-1">Centro de notificaciones</h1>
                        <p class="text-muted mb-0">Revisa cambios de estado, postulaciones y avisos del sistema.</p>
                    </div>
                    <button class="btn btn-primary rounded-pill px-4" id="btnMarcarTodas">
                        <i class="bi bi-check2-all me-2"></i>Marcar todas como leídas
                    </button>
                </div>

                <div id="alertContainer" class="mb-3"></div>

                <div class="row g-3 align-items-end mb-4">
                    <div class="col-12 col-lg-5">
                        <label for="inputBuscar" class="form-label fw-semibold">Buscar</label>
                        <input id="inputBuscar" type="search" class="form-control form-control-lg rounded-4" placeholder="Título o mensaje">
                    </div>
                    <div class="col-12 col-md-6 col-lg-3">
                        <label for="filtroTipo" class="form-label fw-semibold">Tipo</label>
                        <select id="filtroTipo" class="form-select form-select-lg rounded-4">
                            <option value="">Todas</option>
                            <option value="postulacion">Postulaciones</option>
                            <option value="estado">Cambios de estado</option>
                            <option value="sistema">Mensajes del sistema</option>
                            <option value="comentario">Comentarios</option>
                        </select>
                    </div>
                    <div class="col-12 col-md-6 col-lg-2">
                        <label for="filtroLeida" class="form-label fw-semibold">Estado</label>
                        <select id="filtroLeida" class="form-select form-select-lg rounded-4">
                            <option value="">Todas</option>
                            <option value="0">No leídas</option>
                            <option value="1">Leídas</option>
                        </select>
                    </div>
                    <div class="col-12 col-lg-2 d-grid">
                        <button class="btn btn-outline-primary btn-lg rounded-4" id="btnFiltrar">
                            <i class="bi bi-funnel me-2"></i>Filtrar
                        </button>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-12 col-xl-8">
                        <div class="d-grid gap-3" id="listaNotificaciones"></div>
                    </div>
                    <div class="col-12 col-xl-4">
                        <div class="surface-card p-4 h-100">
                            <h2 class="h5 fw-bold mb-3">Resumen</h2>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">No leídas</span>
                                <strong id="resumenNoLeidas">0</strong>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Postulaciones</span>
                                <strong id="resumenPostulaciones">0</strong>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Cambios de estado</span>
                                <strong id="resumenEstado">0</strong>
                            </div>
                            <div class="d-flex justify-content-between">
                                <span class="text-muted">Sistema</span>
                                <strong id="resumenSistema">0</strong>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-custom py-4 mt-auto text-center text-white-50">
        <div class="container">
            <span>Workly 2026 · Gestiona tus oportunidades con orden</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../../assets/js/shared/notificaciones.js"></script>
    <script type="module" src="./app.js"></script>
</body>
</html>
