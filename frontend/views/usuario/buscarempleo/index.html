<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar Empleo | Workly</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="../principal/index.html">Workly Usuario</a>
      <button class="btn btn-light btn-sm" id="btnLogout">Cerrar sesión</button>
    </div>
  </nav>

  <main class="py-4">
    <div class="container">
      <div class="mb-4">
        <h1 class="page-title mb-1">Buscar empleo</h1>
        <p class="text-muted mb-0">Encuentra oportunidades según tus intereses</p>
      </div>

      <div id="alertContainer"></div>

      <div class="card card-custom p-3 p-md-4 mb-4">
        <div class="row g-3">
          <div class="col-md-6">
            <label for="filtroTitulo" class="form-label">Puesto o palabra clave</label>
            <input type="text" id="filtroTitulo" class="form-control" placeholder="Ejemplo: Developer, Diseñador, Ventas">
          </div>

          <div class="col-md-6">
            <label for="filtroCategoria" class="form-label">Categoría</label>
            <select id="filtroCategoria" class="form-select">
              <option value="">Todas las categorías</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="filtroMunicipio" class="form-label">Municipio</label>
            <select id="filtroMunicipio" class="form-select">
              <option value="">Todos los municipios</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="filtroModalidad" class="form-label">Modalidad</label>
            <select id="filtroModalidad" class="form-select">
              <option value="">Todas</option>
              <option value="Remoto">Remoto</option>
              <option value="Presencial">Presencial</option>
              <option value="Híbrido">Híbrido</option>
            </select>
          </div>

          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary" id="btnBuscar">Buscar</button>
            <button class="btn btn-outline-secondary" id="btnLimpiar">Limpiar filtros</button>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Resultados</h5>
        <span class="text-muted" id="contadorResultados">0 vacantes</span>
      </div>

      <div id="contenedorVacantes" class="row g-4">
        <div class="col-12 text-muted">Cargando vacantes...</div>
      </div>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
