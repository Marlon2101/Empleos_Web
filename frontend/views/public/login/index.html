<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workly - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg py-3 bg-secondary">
        <div class="container-fluid px-4 px-lg-5">
            <a class="navbar-brand d-flex align-items-center text-decoration-none" href="index.html">
                <span class="display-5 me-3 lh-1">💼</span>
                <div class="lh-sm">
                    <span class="text-white fw-bold d-block fs-3">Workly</span>
                    <span class="text-white-50 fs-6">Tu búsqueda de trabajo profesional</span>
                </div>
            </a>
            <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
                <div class="d-flex gap-3 mt-3 mt-lg-0 align-items-center">
                    <button class="btn btn-primary px-3 py-2 fw-semibold text-white shadow-sm"
                        onclick="window.location.href='../sesiondashboard/index.html'">Iniciar sesión en
                        dashboard</button>
                    <button class="btn btn-primary px-4 py-2 fw-semibold text-white shadow-sm"
                        onclick="window.location.href='../registro/index.html'">Registrarse</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5 bg-primary-subtle">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-10 col-xl-8">
                    <div class="card bg-white border-0 p-4 p-md-5 mx-2 rounded-5 shadow-lg">

                        <div class="text-center mb-5">
                            <h1 class="display-6 fw-normal text-dark mb-3">Iniciar Sesión</h1>
                            <p class="fs-6 text-dark">Accede a tu cuenta de Workly</p>
                        </div>

                        <div id="alertContainer"></div>

                        <div class="row justify-content-center">
                            <div class="col-12 col-md-10">

                                <form id="formLogin">
                                    
                                    <div class="mb-4">
                                        <label class="form-label fw-bold text-dark">Correo electrónico</label>
                                        <div class="input-group">
                                            <input type="email" id="correo"
                                                class="form-control form-control-lg border-end-0 border-dark-subtle bg-transparent" required>
                                            <span class="input-group-text bg-transparent border-start-0 border-dark-subtle">
                                                <i class="bi bi-envelope-fill text-dark"></i>
                                            </span>
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label fw-bold text-dark">Contraseña</label>
                                        <div class="input-group">
                                            <input type="password" id="password"
                                                class="form-control form-control-lg border-end-0 border-dark-subtle bg-transparent" required>
                                            <span class="input-group-text bg-transparent border-start-0 border-dark-subtle">
                                                <i class="bi bi-lock-fill text-dark"></i>
                                            </span>
                                        </div>
                                    </div>

                                    <div class="d-flex justify-content-between align-items-center mb-5">
                                        <div class="form-check mb-0">
                                            <input class="form-check-input bg-dark border-dark" type="checkbox"
                                                id="recordarme" checked>
                                            <label class="form-check-label text-dark" for="recordarme">Recordarme</label>
                                        </div>
                                        <a href="#" class="text-dark text-decoration-underline">¿Olvidaste tu
                                            contraseña?</a>
                                    </div>

                                    <div class="row g-3 mb-4">
                                        <div class="col-12 col-sm-6 d-grid">
                                            <button type="submit"
                                                class="btn btn-primary text-white py-2 shadow-sm rounded-3">
                                                Iniciar Sesión
                                            </button>
                                        </div>
                                        <div class="col-12 col-sm-6 d-grid">
                                            <button type="button"
                                                class="btn btn-light border text-dark py-2 shadow-sm rounded-3 d-flex justify-content-center align-items-center gap-2">
                                                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                                                        alt="Google" width="16" height="16">
                                                Continuar con Google
                                            </button>
                                        </div>
                                    </div>
                                </form>
                                <div class="text-center mt-3">
                                    <span class="text-dark">¿Aún no tienes cuenta?</span>
                                    <a href="../registro/index.html"
                                        class="text-dark fw-bold text-decoration-none ms-1">Regístrate ahora</a>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4 mt-auto bg-secondary">
        <div class="container text-center">
            <div class="d-flex justify-content-center gap-5">
                <a href="#" class="text-white-50 text-decoration-none">Ayuda</a>
                <a href="#" class="text-white-50 text-decoration-none">Privacidad</a>
                <span class="text-white-50">Workly &nbsp;&nbsp;&nbsp; 2026</span>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.getElementById('formLogin').addEventListener('submit', function(event) {
        event.preventDefault(); // Evita recargar la página y evita buscar el backend

        // Obtenemos los valores de los inputs
        const emailInput = document.getElementById('correo');
        const passInput = document.getElementById('password');

        const emailValue = emailInput.value.trim().toLowerCase();
        const passValue = passInput.value.trim();

        // Validación visual simple
        if (emailValue === '' || passValue === '') {
            alert("Por favor, completa todos los campos.");
            return;
        }

        // Determinar el tipo automáticamente según el correo para el ruteo de prueba
        let tipoValue = 'usuario';
        if (emailValue.includes('@empresa')) {
            tipoValue = 'empresa';
        }

        // --- INICIO DE LA SIMULACIÓN ---
        const alertContainer = document.getElementById('alertContainer');
        if(alertContainer) {
            alertContainer.innerHTML = `
                <div class="alert alert-success shadow-sm" role="alert">
                    ¡Simulación de inicio de sesión exitosa! Redirigiendo...
                </div>
            `;
        }

        // CREAR EL TOKEN FALSO
        const fakeData = {
            token: "token_simulado_12345",
            tipo: tipoValue,
            data: { nombre: "Usuario de Prueba", correo: emailValue }
        };
        localStorage.setItem("session", JSON.stringify(fakeData));

        // LÓGICA DE RUTEO AUTOMÁTICA
        setTimeout(() => {
            if (tipoValue === 'empresa') {
                window.location.href = '../../empresa/principal/index.html'; 
            } else {
                window.location.href = '../../usuario/principal/index.html';
            }
        }, 1500);
    });
</script>
    </body>

</html>
