<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Workly</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="login-wrapper">
    <div class="container">
      <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-12 col-md-8 col-lg-5">
          <div class="card card-custom p-4 p-md-5">
            <div class="text-center mb-4">
              <h1 class="page-title mb-2">Workly</h1>
              <p class="text-muted mb-0">Inicia sesión para continuar</p>
            </div>

            <div id="alertContainer"></div>

            <form id="formLogin">
              <div class="mb-3">
                <label for="correo_electronico" class="form-label">Correo electrónico</label>
                <input
                  type="email"
                  class="form-control"
                  id="correo_electronico"
                  placeholder="correo@ejemplo.com"
                  required
                >
              </div>

              <div class="mb-3">
                <label for="contrasena" class="form-label">Contraseña</label>
                <input
                  type="password"
                  class="form-control"
                  id="contrasena"
                  placeholder="Ingresa tu contraseña"
                  required
                >
              </div>

              <div class="mb-4">
                <label for="tipo" class="form-label">Tipo de acceso</label>
                <select class="form-select" id="tipo" required>
                  <option value="">Selecciona una opción</option>
                  <option value="usuario">Usuario</option>
                  <option value="empresa">Empresa</option>
                </select>
              </div>

              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary btn-lg">
                  Iniciar sesión
                </button>
              </div>

              <div class="text-center">
                <a href="../registro/index.html" class="link-clean">
                  ¿No tienes cuenta? Regístrate
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
