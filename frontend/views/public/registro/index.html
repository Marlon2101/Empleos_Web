<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | Workly</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="registro-wrapper py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="card card-custom p-4 p-md-5">
            <div class="text-center mb-4">
              <h1 class="page-title mb-2">Crear cuenta</h1>
              <p class="text-muted mb-0">Regístrate como usuario o empresa</p>
            </div>

            <div id="alertContainer"></div>

            <form id="formRegistro">
              <div class="row">
                <div class="col-12 mb-3">
                  <label for="tipoRegistro" class="form-label">Tipo de cuenta</label>
                  <select id="tipoRegistro" class="form-select" required>
                    <option value="">Selecciona una opción</option>
                    <option value="usuario">Usuario</option>
                    <option value="empresa">Empresa</option>
                  </select>
                </div>
              </div>

              <div id="camposUsuario" class="d-none">
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label for="nombres" class="form-label">Nombres</label>
                    <input type="text" id="nombres" class="form-control">
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="apellidos" class="form-label">Apellidos</label>
                    <input type="text" id="apellidos" class="form-control">
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="correoUsuario" class="form-label">Correo electrónico</label>
                    <input type="email" id="correoUsuario" class="form-control">
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="passwordUsuario" class="form-label">Contraseña</label>
                    <input type="password" id="passwordUsuario" class="form-control">
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="telefonoUsuario" class="form-label">Teléfono</label>
                    <input type="text" id="telefonoUsuario" class="form-control">
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="municipioUsuario" class="form-label">Municipio</label>
                    <select id="municipioUsuario" class="form-select">
                      <option value="">Selecciona un municipio</option>
                    </select>
                  </div>
                  <div class="col-12 mb-3">
                    <label for="resumenProfesional" class="form-label">Resumen profesional</label>
                    <textarea id="resumenProfesional" class="form-control" rows="4"></textarea>
                  </div>
                </div>
              </div>

              <div id="camposEmpresa" class="d-none">
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label for="nombreComercial" class="form-label">Nombre comercial</label>
                    <input type="text" id="nombreComercial" class="form-control">
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="razonSocial" class="form-label">Razón social</label>
                    <input type="text" id="razonSocial" class="form-control">
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="correoEmpresa" class="form-label">Correo electrónico</label>
                    <input type="email" id="correoEmpresa" class="form-control">
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="passwordEmpresa" class="form-label">Contraseña</label>
                    <input type="password" id="passwordEmpresa" class="form-control">
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="sitioWeb" class="form-label">Sitio web</label>
                    <input type="text" id="sitioWeb" class="form-control">
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="municipioEmpresa" class="form-label">Municipio</label>
                    <select id="municipioEmpresa" class="form-select">
                      <option value="">Selecciona un municipio</option>
                    </select>
                  </div>
                  <div class="col-12 mb-3">
                    <label for="descripcionEmpresa" class="form-label">Descripción de la empresa</label>
                    <textarea id="descripcionEmpresa" class="form-control" rows="4"></textarea>
                  </div>
                </div>
              </div>

              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary btn-lg">Registrarme</button>
              </div>

              <div class="text-center">
                <a href="../login/index.html" class="link-clean">
                  ¿Ya tienes cuenta? Inicia sesión
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
