<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workly - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="d-flex flex-column min-vh-100 bg-primary-subtle">

    <nav class="navbar navbar-expand-lg py-3 bg-secondary">
        <div class="container-fluid px-4 px-lg-5 text-white">
            <span class="fw-bold fs-3">Workly</span>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-10 col-xl-8">
                    <div class="card bg-white border-0 p-4 p-md-5 rounded-5 shadow-lg">
                        
                        <div class="text-center mb-4">
                            <h1 class="display-6 fw-normal text-dark mb-4">Registro</h1>
                            
                            <ul class="nav nav-pills justify-content-center bg-secondary-subtle rounded-pill p-1 d-inline-flex mx-auto" id="registroTabs">
                                <li class="nav-item">
                                    <button class="nav-link active rounded-pill px-4 text-dark fw-semibold" id="tabUsuario" type="button">Usuario</button>
                                </li>
                                <li class="nav-item">
                                    <button class="nav-link rounded-pill px-4 text-dark fw-semibold" id="tabEmpresa" type="button">Empresa</button>
                                </li>
                            </ul>
                        </div>

                        <div id="alertContainer"></div>

                        <form id="formRegistro">
                            
                            <div id="camposUsuario">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Nombres</label>
                                    <input type="text" id="nombreUsuario" class="form-control form-control-lg border-dark-subtle">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Apellidos</label>
                                    <input type="text" id="apellidosUsuario" class="form-control form-control-lg border-dark-subtle">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Correo Electrónico</label>
                                    <input type="email" id="emailUsuario" class="form-control form-control-lg border-dark-subtle">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Teléfono</label>
                                    <input type="text" id="telefonoUsuario" class="form-control form-control-lg border-dark-subtle">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Contraseña</label>
                                    <input type="password" id="passUsuario" class="form-control form-control-lg border-dark-subtle">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Confirmar Contraseña</label>
                                    <input type="password" id="passConfUsuario" class="form-control form-control-lg border-dark-subtle">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Municipio</label>
                                    <select id="municipioUsuario" class="form-select form-select-lg border-dark-subtle"></select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Resumen Profesional</label>
                                    <textarea id="resumenProfesional" class="form-control border-dark-subtle" rows="3"></textarea>
                                </div>
                            </div>

                            <div id="camposEmpresa" class="d-none">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Nombre Comercial</label>
                                    <input type="text" id="nombreComercial" class="form-control form-control-lg border-dark-subtle">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Razón Social</label>
                                    <input type="text" id="razonSocial" class="form-control form-control-lg border-dark-subtle">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Correo Corporativo</label>
                                    <input type="email" id="emailEmpresa" class="form-control form-control-lg border-dark-subtle">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Teléfono Empresa</label>
                                    <input type="text" id="telefonoEmpresa" class="form-control form-control-lg border-dark-subtle">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Contraseña</label>
                                    <input type="password" id="passEmpresa" class="form-control form-control-lg border-dark-subtle">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Confirmar Contraseña</label>
                                    <input type="password" id="passConfEmpresa" class="form-control form-control-lg border-dark-subtle">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Municipio</label>
                                    <select id="municipioEmpresa" class="form-select form-select-lg border-dark-subtle"></select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Descripción de la Empresa</label>
                                    <textarea id="descEmpresa" class="form-control border-dark-subtle" rows="3"></textarea>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 text-white py-3 shadow-sm rounded-3 mt-3 fw-bold">
                                REGISTRARSE
                            </button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4 mt-auto bg-secondary text-center text-white-50">
        Workly &copy; 2026
    </footer>

    <script type="module" src="./app.js"></script>
</body>
</html>
